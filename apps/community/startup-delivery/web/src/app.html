<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Live market recon, domain checks, and startup packages delivered in minutes."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!-- Social defaults; per-delivery pages override og:title/description in <svelte:head>. -->
    <meta property="og:site_name" content="startup.delivery" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="startup.delivery · one sentence in, proof out" />
    <meta
      property="og:description"
      content="Describe a startup idea in one sentence. Live market recon, a positioning gap, real domain availability, and a launch-ready package, in minutes."
    />
    <meta property="og:image" content="/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="startup.delivery · one sentence in, proof out" />
    <meta name="twitter:image" content="/og.png" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
