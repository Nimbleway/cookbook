# Environment for the competitor-intel agent.
# Apply with:  ant beta:environments create < environment.yaml
# Cloud container. allow_mcp_servers covers the Nimble MCP; slack.com is allow-listed so the
# agent can post the digest via the Slack Web API (the bot-token credential is substituted at
# egress to those hosts only).

name: nimble-competitor-intel-env
config:
  type: cloud
  networking:
    type: limited
    allow_mcp_servers: true
    allow_package_managers: false
    allowed_hosts:
      - slack.com
      - "*.slack.com"
